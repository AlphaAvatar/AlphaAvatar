<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alpha-logo-gradient" x1="0" y1="0" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="48%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.14"/>
      <stop offset="58%" stop-color="#60A5FA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="logo-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.49
                0 0 0 0 0.23
                0 0 0 0 0.93
                0 0 0 0.35 0"
      />
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>

    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#6366F1" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="500" fill="#FFFFFF"/>
  <rect width="1600" height="500" fill="url(#grid)"/>
  <rect width="1600" height="500" fill="url(#bg-glow)"/>

  <g transform="translate(230 120)">
    <g filter="url(#logo-glow)">
      <path
        d="M130 18L250 250L154 198L130 252L106 198L10 250L130 18Z"
        stroke="url(#alpha-logo-gradient)"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <path
        d="M130 92L184 198L148 179L130 218L112 179L76 198L130 92Z"
        stroke="url(#alpha-logo-gradient)"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.58"
      />
    </g>
  </g>

  <text
    x="545"
    y="285"
    fill="#0B1020"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="132"
    font-weight="700"
    letter-spacing="-6"
  >
    AlphaAvatar
  </text>

  <text
    x="552"
    y="350"
    fill="#5B6172"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="30"
    font-weight="400"
    letter-spacing="-0.6"
  >
    Self-hostable Omni-Avatar personal assistant framework
  </text>
</svg>