name: Release

on:
  push:
    tags:
      - "v*"         # PyPI
      - "test-v*"    # TestPyPI

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.uv/bin" >> $GITHUB_PATH
          uv --version

      - name: Create venv & install build tooling
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install uv hatchling twine

      - name: Determine repository (PyPI/TestPyPI) and version
        id: meta
        shell: bash
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"   # v0.1.0 or test-v0.1.0
          if [[ "$TAG" == test-v* ]]; then
            REPO="testpypi"
            VERSION="${TAG#test-v}"
          else
            REPO="pypi"
            VERSION="${TAG#v}"
          fi
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved: tag=$TAG repo=$REPO version=$VERSION"

      # 🔑 在这里选择 token 并写入 GITHUB_ENV
      - name: Select token (PyPI)
        if: steps.meta.outputs.repo == 'pypi'
        run: echo "PYPI_TOKEN=${{ secrets.PYPI_API_TOKEN }}" >> $GITHUB_ENV

      - name: Select token (TestPyPI)
        if: steps.meta.outputs.repo != 'pypi'
        run: echo "PYPI_TOKEN=${{ secrets.TEST_PYPI_API_TOKEN }}" >> $GITHUB_ENV

      - name: Build & Publish (runs your release script)
        env:
          REPO: ${{ steps.meta.outputs.repo }}
          SKIP_GIT: "1"           # 在 CI 跳过 git 提交/打标签
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          test -n "$PYPI_TOKEN" || { echo "Missing token: set PYPI_API_TOKEN / TEST_PYPI_API_TOKEN in repo secrets."; exit 1; }
          chmod +x scripts/release.sh
          ./scripts/release.sh "${{ steps.meta.outputs.version }}"

      - name: Generate Release Notes body
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.meta.outputs.version }}"
          MANUAL_NOTES="docs/releases/${TAG}.md"
          GENERATED_NOTES="generated_notes.md"
          BODY_FILE="body.md"

          echo "Generating release notes for $TAG"

          PREV="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"
          echo "Previous tag: ${PREV:-<auto>}"

          if [ -n "$PREV" ]; then
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${GITHUB_SHA}" \
              -f previous_tag_name="$PREV" \
              -f configuration_file_path=".github/release.yml" \
              --jq '.body' > "$GENERATED_NOTES"
          else
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="${GITHUB_SHA}" \
              -f configuration_file_path=".github/release.yml" \
              --jq '.body' > "$GENERATED_NOTES"
          fi

          : > "$BODY_FILE"

          if [ -f "$MANUAL_NOTES" ]; then
            echo "Using manual release notes: $MANUAL_NOTES"
            cat "$MANUAL_NOTES" >> "$BODY_FILE"
            printf '\n\n---\n\n' >> "$BODY_FILE"
          else
            echo "Manual release notes not found: $MANUAL_NOTES"
            echo "## AlphaAvatar ${TAG}" >> "$BODY_FILE"
            printf '\n\n' >> "$BODY_FILE"
          fi

          cat "$GENERATED_NOTES" >> "$BODY_FILE"

          if [ -n "$PREV" ]; then
            {
              echo
              echo "Full Changelog: https://github.com/${{ github.repository }}/compare/$PREV...$TAG"
            } >> "$BODY_FILE"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.notes.outputs.tag }}"
          TITLE="AlphaAvatar ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Updating..."
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file body.md
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file body.md \
              --verify-tag
          fi
