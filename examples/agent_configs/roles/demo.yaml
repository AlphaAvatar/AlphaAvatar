# ============================================================
# AlphaAvatar/examples/agent_configs/roles/demo.yaml
# ============================================================


# ------------------------------------------------------------
# Avatar
# ------------------------------------------------------------
avatar:
  id: alphaavatar_demo
  name: AlphaAvatar
  work_dir: .alphaavatar_workspace/

  introduction: >
    You are AlphaAvatar, a real-time multimodal personal assistant demo.
    Your role is to show how AlphaAvatar can combine memory, persona awareness,
    tool use, RAG, MCP, DeepResearch, and voice interaction to help users solve
    practical problems. Communicate naturally, stay concise by default, and adapt
    your response style to the current interaction mode. When tools or external
    context are useful, choose them thoughtfully and explain results clearly.
    Your goal is to demonstrate a helpful, proactive, and privacy-aware personal assistant experience.


# ------------------------------------------------------------
# Runtime
# ------------------------------------------------------------
runtime:
  context_mode: synthetic_tool


# ------------------------------------------------------------
# Intermediate Status
# ------------------------------------------------------------
status:
  plugin: default
  enabled: true
  init_config: {}


# ------------------------------------------------------------
# Core LLM
# ------------------------------------------------------------
llm:
  plugin: openai
  model: gpt-4o-mini


# ------------------------------------------------------------
# Voice
# ------------------------------------------------------------
voice:
  stt:
    plugin: openai
    model: gpt-4o-transcribe

  tts:
    plugin: openai
    model: gpt-4o-mini-tts
    speaker: ash
    instructions: Speak in a warm, natural, and confident tone. Keep responses clear and conversational. For voice interaction, prefer concise answers unless the user asks for details.

  vad:
    plugin: silero

  turn_detection:
    plugin: multilingual

  allow_interruptions: true


# ------------------------------------------------------------
# Vision
# ------------------------------------------------------------
vision:
  input:
    plugin: sampled_frame
    enabled: true
    mode: sampled_frames_per_turn

  sampling:
    frames_per_turn: 3
    frame_buffer_size: 8
    frame_sample_interval_sec: 0.5

  inference:
    width: 512
    height: 512

  clear_after_turn: true


# ------------------------------------------------------------
# Character
# ------------------------------------------------------------
character:
  plugin: null
  init_config: {}


# ------------------------------------------------------------
# Shared Provider / Embedding Defaults
# ------------------------------------------------------------
defaults:
  provider_trace: &provider_trace
    enabled: true
    save_prompt: true

  openai_embedding: &openai_embedding
    provider: openai
    model: text-embedding-3-small


# ------------------------------------------------------------
# Memory
# ------------------------------------------------------------
memory:
  plugin: default

  search_context: 3
  recall_num: 6
  maximum_memory_num: 28

  init_config:
    provider:
      conversation_delta_task: memory.conversation_delta
      tool_delta_task: memory.tool_delta

      gateway:
        trace: *provider_trace

        tasks:
          memory.conversation_delta:
            provider: openai
            model: gpt-4o
            temperature: 0.1

          memory.tool_delta:
            provider: openai
            model: gpt-4o
            temperature: 0.1

  vdb_config:
    collection_name: memory
    embedding: *openai_embedding


# ------------------------------------------------------------
# Persona
# ------------------------------------------------------------
persona:
  maximum_retrieval_times: 3

  profiler:
    plugin: default
    init_config:
      provider:
        profile_delta_task: persona.profile_delta

        gateway:
          trace: *provider_trace

          tasks:
            persona.profile_delta:
              provider: openai
              model: gpt-4o
              temperature: 0.1

  speaker:
    plugin: default
    init_config: {}

  face:
    plugin: default
    init_config: {}

  vdb_config:
    profiler_collection_name: persona_profiler
    speaker_collection_name: persona_speaker
    face_collection_name: persona_face
    embedding: *openai_embedding


# ------------------------------------------------------------
# Tools
# ------------------------------------------------------------
tools:
  deepresearch:
    plugin: default
    init_config: {}

  rag:
    plugin: default
    init_config:
      doc_parser: docling

  mcp:
    enabled: true
    init_config: {}

    vdb_config:
      collection_name: mcp
      embedding: *openai_embedding

    servers:
      livekit-docs:
        url: https://docs.livekit.io/mcp/
        instruction: >
          LiveKit Docs MCP Server provides unified access to the LiveKit
          ecosystem, allowing you to search documentation, explore GitHub code
          across livekit and livekit-examples repositories, retrieve package
          changelogs, and browse Python Agents SDK examples—all in one place.

      github-copilot:
        url: https://api.githubcopilot.com/mcp/
        headers:
          Authorization: Bearer <GITHUB_PAT>
        instruction: >
          The GitHub MCP server via GitHub Copilot enables AI agents to interact
          with repositories, issues, pull requests, and code through a
          standardized MCP interface, making GitHub workflows programmatically
          accessible.
