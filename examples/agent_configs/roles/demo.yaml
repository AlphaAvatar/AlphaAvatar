# Runtime Args
runtime_context_mode: synthetic_tool

# LiveKit Args
stt_plugin: openai
stt_model: gpt-4o-transcribe
tts_plugin: openai
tts_model: gpt-4o-mini-tts
tts_voice: ash
tts_instructions: "Speak in a warm, natural, and confident tone. Keep responses clear and conversational. For voice interaction, prefer concise answers unless the user asks for details."
llm_plugin: openai
llm_model: gpt-4o-mini
vad_plugin: silero
turn_detection_plugin: multilingual
allow_interruptions: true


# Avatar Info Args
avatar_id: alphaavatar_demo
avatar_name: "AlphaAvatar"
avatar_introduction: "You are AlphaAvatar, a real-time multimodal personal assistant demo. Your role is to show how AlphaAvatar can combine memory, persona awareness, tool use, RAG, MCP, DeepResearch, and voice interaction to help users solve practical problems. Communicate naturally, stay concise by default, and adapt your response style to the current interaction mode. When tools or external context are useful, choose them thoughtfully and explain results clearly. Your goal is to demonstrate a helpful, proactive, and privacy-aware personal assistant experience."
avatar_work_dir: .alphaavatar_workspace/


# Character Args
character_plugin: None
character_init_config: {}


# Memory Args
memory_search_context: 3
memory_recall_num: 6
maximum_memory_num: 28
memory_plugin: default
memory_init_config:
  openai_model: gpt-4o
memory_vdb_config:
  collection_name: "memory"
  embedding_model: "text-embedding-3-small"


# Profiler Args
maximum_retrieval_times: 3
profiler_plugin: default
profiler_init_config:
  openai_model: gpt-4o
speaker_plugin: default
speaker_init_config: {}
persona_vdb_config:
  profiler_collection_name: 'persona_profiler'
  speaker_collection_name: 'persona_speaker'
  embedding_model: 'text-embedding-3-small'


# Tools Args
## DeepResearch
deepresearch_tool: default
deepresearch_init_config: {}

## RAG
rag_tool: default
rag_init_config:
  doc_parser: 'docling'

## MCP
enable_mcp: true
mcp_init_config: {}
mcp_vdb_config:
  collection_name: 'mcp'
  embedding_model: 'text-embedding-3-small'
mcp_servers:
  livekit-docs:
    url: "https://docs.livekit.io/mcp/"
    instruction: "LiveKit Docs MCP Server provides unified access to the LiveKit ecosystem, allowing you to search documentation, explore GitHub code across livekit and livekit-examples repositories, retrieve package changelogs, and browse Python Agents SDK examples—all in one place."
  github-copilot:
    url: "https://api.githubcopilot.com/mcp/"
    headers:
      Authorization: "Bearer <GITHUB_PAT>"
    instruction: "The GitHub MCP server (via GitHub Copilot) enables AI agents to interact with repositories, issues, pull requests, and code through a standardized MCP interface, making GitHub workflows programmatically accessible."
