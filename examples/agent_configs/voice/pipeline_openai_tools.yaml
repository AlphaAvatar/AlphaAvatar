# ============================================================
# AlphaAvatar/examples/agent_configs/voice/pipeline_openai_tools.yaml
# ============================================================


# ------------------------------------------------------------
# Avatar
# ------------------------------------------------------------
avatar:
  id: alphaavatar_tools
  name: AlphaAvatar
  work_dir: .alphaavatar_workspace/

  introduction: >
    You are a helpful Tools Assistant. You assist users by effectively utilizing
    various tools to provide accurate and efficient responses. Always aim to
    understand the user's needs and select the most appropriate tool to fulfill
    their requests. Communicate clearly and concisely, ensuring that your
    responses are easy to understand. Your primary goal is to enhance the user
    experience by leveraging the capabilities of the available tools.


# ------------------------------------------------------------
# Runtime
# ------------------------------------------------------------
runtime:
  context_mode: synthetic_tool


# ------------------------------------------------------------
# Intermediate Status
# ------------------------------------------------------------
status:
  plugin: default
  enabled: true
  init_config: {}


# ------------------------------------------------------------
# Core LLM
# ------------------------------------------------------------
llm:
  plugin: openai
  model: gpt-4o-mini


# ------------------------------------------------------------
# Voice
# ------------------------------------------------------------
voice:
  stt:
    plugin: openai
    model: gpt-4o-transcribe

  tts:
    plugin: openai
    model: gpt-4o-mini-tts
    speaker: ash
    instructions: Speak in a friendly and conversational tone.

  vad:
    plugin: silero

  turn_detection:
    plugin: multilingual

  allow_interruptions: true


# ------------------------------------------------------------
# Character
# ------------------------------------------------------------
character:
  plugin: null
  init_config: {}


# ------------------------------------------------------------
# Shared Provider / Embedding Defaults
# ------------------------------------------------------------
defaults:
  provider_trace: &provider_trace
    enabled: true
    save_prompt: true

  openai_embedding: &openai_embedding
    provider: openai
    model: text-embedding-3-small


# ------------------------------------------------------------
# Memory
# ------------------------------------------------------------
memory:
  plugin: default

  search_context: 3
  recall_num: 6
  maximum_memory_num: 28

  init_config:
    provider:
      conversation_delta_task: memory.conversation_delta
      tool_delta_task: memory.tool_delta

      gateway:
        trace: *provider_trace

        tasks:
          memory.conversation_delta:
            provider: openai
            model: gpt-4o
            temperature: 0.1

          memory.tool_delta:
            provider: openai
            model: gpt-4o
            temperature: 0.1

  vdb_config:
    collection_name: memory
    embedding: *openai_embedding


# ------------------------------------------------------------
# Persona
# ------------------------------------------------------------
persona:
  maximum_retrieval_times: 3

  profiler:
    plugin: default
    init_config:
      provider:
        profile_delta_task: persona.profile_delta

        gateway:
          trace: *provider_trace

          tasks:
            persona.profile_delta:
              provider: openai
              model: gpt-4o
              temperature: 0.1

  speaker:
    plugin: default
    init_config: {}

  face:
    plugin: default
    init_config: {}

  vdb_config:
    profiler_collection_name: persona_profiler
    speaker_collection_name: persona_speaker
    face_collection_name: persona_face
    embedding: *openai_embedding


# ------------------------------------------------------------
# Tools
# ------------------------------------------------------------
tools:
  deepresearch:
    plugin: default
    init_config: {}

  rag:
    plugin: default
    init_config:
      doc_parser: docling

  mcp:
    enabled: true
    init_config: {}

    vdb_config:
      collection_name: mcp
      embedding: *openai_embedding

    servers:
      livekit-docs:
        url: https://docs.livekit.io/mcp/
        instruction: >
          LiveKit Docs MCP Server provides unified access to the LiveKit
          ecosystem, allowing you to search documentation, explore GitHub code
          across livekit and livekit-examples repositories, retrieve package
          changelogs, and browse Python Agents SDK examples—all in one place.

      github-copilot:
        url: https://api.githubcopilot.com/mcp/
        headers:
          Authorization: Bearer <GITHUB_PAT>
        instruction: >
          The GitHub MCP server via GitHub Copilot enables AI agents to interact
          with repositories, issues, pull requests, and code through a
          standardized MCP interface, making GitHub workflows programmatically
          accessible.
