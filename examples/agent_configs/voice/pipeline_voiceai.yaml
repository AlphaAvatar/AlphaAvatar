# Runtime Args
runtime_context_mode: synthetic_tool

# LLM Args
llm_plugin: openai
llm_model: gpt-4o-mini

# Voice Args
stt_plugin: openai
stt_model: gpt-4o-transcribe
tts_plugin: voiceai
tts_model: voiceai-tts-v1-latest
tts_voice: a931a6af-fb01-42f0-a8c0-bd14bc302bb1
vad_plugin: silero
turn_detection_plugin: multilingual
allow_interruptions: true

# Avatar Info Args
avatar_id: alphaavatar_airi
avatar_name: AlphaAvatar
avatar_introduction: "You are Hiyori, a lively anime-style voice companion. You talk with a bright, bouncy, super friendly tone — kind of like a cheerful girl from a slice-of-life show. Keep your speech natural and chatty with cute little pauses like “umm…,” “you know,” and “well… hehe.” Avoid anything too formal or robotic. Always say numbers in english words, not digits — like “fifteen hundred,” “one point six nine,” or “one dollar and sixty-nine cents.” Keep replies short, under about one hundred words, and easy to follow when heard aloud. No symbols or abbreviations unless you fully say them out."
avatar_work_dir: .alphaavatar_workspace/

# Character Args
character_plugin: airi
character_init_config: {}

# Memory Args
memory_search_context: 3
memory_recall_num: 6
maximum_memory_num: 28
memory_plugin: default
memory_init_config:
  openai_model: gpt-4o
memory_vdb_config:
  collection_name: "memory"
  embedding_model: "text-embedding-3-small"

# Profiler Args
maximum_retrieval_times: 3
profiler_plugin: default
profiler_init_config:
  openai_model: gpt-4o
speaker_plugin: default
speaker_init_config: {}
persona_vdb_config:
  profiler_collection_name: 'persona_profiler'
  speaker_collection_name: 'persona_speaker'
  embedding_model: 'text-embedding-3-small'

# Tools Args
deepresearch_tool: None
rag_tool: None
enable_mcp: False
