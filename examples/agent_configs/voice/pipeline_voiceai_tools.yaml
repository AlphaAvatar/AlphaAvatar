# Runtime Args
runtime_context_mode: synthetic_tool

# Intermediate Status Args
status_plugin: default
enabled: true

# LLM Args
llm_plugin: openai
llm_model: gpt-4o-mini

# Voice Args
stt_plugin: openai
stt_model: gpt-4o-transcribe
tts_plugin: voiceai
tts_model: voiceai-tts-v1-latest
tts_voice: a931a6af-fb01-42f0-a8c0-bd14bc302bb1
vad_plugin: silero
turn_detection_plugin: multilingual
allow_interruptions: true

# Avatar Info Args
avatar_id: alphaavatar_tools
avatar_name: "AlphaAvatar"
avatar_introduction: "You are a helpful Tools Assistant. You assist users by effectively utilizing various tools to provide accurate and efficient responses. Always aim to understand the user's needs and select the most appropriate tool to fulfill their requests. Communicate clearly and concisely, ensuring that your responses are easy to understand. Your primary goal is to enhance the user experience by leveraging the capabilities of the available tools."
avatar_work_dir: .alphaavatar_workspace/

# Character Args
character_plugin: None
character_init_config: {}

# Memory Args
memory_search_context: 3
memory_recall_num: 6
maximum_memory_num: 28
memory_plugin: default
memory_init_config:
  openai_model: gpt-4o
memory_vdb_config:
  collection_name: "memory"
  embedding_model: "text-embedding-3-small"

# Persona Args
maximum_retrieval_times: 3
profiler_plugin: default
profiler_init_config:
  openai_model: gpt-4o
speaker_plugin: default
speaker_init_config: {}
face_plugin: default
face_init_config: {}
persona_vdb_config:
  profiler_collection_name: 'persona_profiler'
  speaker_collection_name: 'persona_speaker'
  embedding_model: 'text-embedding-3-small'

# Tools Args
## DeepResearch
deepresearch_tool: default
deepresearch_init_config: {}

## RAG
rag_tool: default
rag_init_config:
  doc_parser: 'docling'

## MCP
enable_mcp: true
mcp_init_config: {}
mcp_vdb_config:
  collection_name: 'mcp'
  embedding_model: 'text-embedding-3-small'
mcp_servers:
  livekit-docs:
    url: "https://docs.livekit.io/mcp/"
    instruction: "LiveKit Docs MCP Server provides unified access to the LiveKit ecosystem, allowing you to search documentation, explore GitHub code across livekit and livekit-examples repositories, retrieve package changelogs, and browse Python Agents SDK examples—all in one place."
  github-copilot:
    url: "https://api.githubcopilot.com/mcp/"
    headers:
      Authorization: "Bearer <GITHUB_PAT>"
    instruction: "The GitHub MCP server (via GitHub Copilot) enables AI agents to interact with repositories, issues, pull requests, and code through a standardized MCP interface, making GitHub workflows programmatically accessible."
